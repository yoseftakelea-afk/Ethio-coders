<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ethio Habesha Coders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Login Form -->
        <div id="loginForm" class="login-container">
            <div class="login-box glass-effect">
                <h2><i class="fas fa-lock"></i> Admin Login</h2>
                <form id="adminLogin">
                    <input type="text" id="adminUsername" placeholder="Username" required>
                    <input type="password" id="adminPassword" placeholder="Password" required>
                    <button type="submit">Login <i class="fas fa-sign-in-alt"></i></button>
                </form>
            </div>
        </div>
        
        <!-- Dashboard -->
        <div id="dashboard" style="display: none;">
            <nav class="admin-nav">
                <div class="logo">
                    <i class="fas fa-code"></i>
                    <span>Admin Dashboard</span>
                </div>
                <div class="admin-actions">
                    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </nav>
            
            <div class="dashboard-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <h3>Total Users</h3>
                        <p id="totalUsers">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-book"></i>
                        <h3>Total Courses</h3>
                        <p id="totalCourses">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-chart-line"></i>
                        <h3>Active Users</h3>
                        <p id="activeUsers">0</p>
                    </div>
                </div>
                
                <div class="admin-sections">
                    <div class="section">
                        <h3><i class="fas fa-users"></i> Manage Users</h3>
                        <button class="btn-add" onclick="showAddUserModal()">Add New User</button>
                        <div class="table-container">
                            <table id="usersTable">
                                <thead>
                                    <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                                </thead>
                                <tbody id="usersList"></tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3><i class="fas fa-book"></i> Manage Courses</h3>
                        <button class="btn-add" onclick="showAddCourseModal()">Add New Course</button>
                        <div class="table-container">
                            <table id="coursesTable">
                                <thead>
                                    <tr><th>ID</th><th>Title</th><th>Category</th><th>Actions</th></tr>
                                </thead>
                                <tbody id="coursesList"></tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3><i class="fas fa-palette"></i> Website Settings</h3>
                        <div class="settings-form">
                            <label>Primary Color:</label>
                            <input type="color" id="primaryColor" value="#078b4b">
                            <label>Secondary Color:</label>
                            <input type="color" id="secondaryColor" value="#fcd34d">
                            <button onclick="updateWebsiteSettings()">Save Settings</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modals -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <h3>Add New User</h3>
            <form id="addUserForm">
                <input type="text" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <select>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit">Add User</button>
                <button type="button" onclick="closeModal('addUserModal')">Cancel</button>
            </form>
        </div>
    </div>
    
    <div id="addCourseModal" class="modal">
        <div class="modal-content">
            <h3>Add New Course</h3>
            <form id="addCourseForm">
                <input type="text" placeholder="Course Title" required>
                <textarea placeholder="Course Description" required></textarea>
                <select>
                    <option value="frontend">Frontend</option>
                    <option value="backend">Backend</option>
                </select>
                <button type="submit">Add Course</button>
                <button type="button" onclick="closeModal('addCourseModal')">Cancel</button>
            </form>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
